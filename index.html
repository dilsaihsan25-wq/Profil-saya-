<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil Saya</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.container {
    background: white;
    padding: 25px;
    width: 320px;
    border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
    transition: transform 0.3s;
}

.container:hover {
    transform: scale(1.03);
}

/* FOTO */
.profile {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #74ebd5;
    margin-bottom: 15px;
}

h1 {
    margin: 10px 0;
}

p {
    margin: 5px 0;
    color: #555;
}

/* SOSIAL */
.social a {
    display: inline-block;
    margin: 8px 5px;
    padding: 8px 12px;
    border-radius: 10px;
    background: #74ebd5;
    color: black;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

.social a:hover {
    background: #0077ff;
    color: white;
}

/* 🔥 TOMBOL MUSIK */
.music-btn {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    width: 70px;
    height: 70px;
    border-radius: 50%;
    border: none;
    
    background: linear-gradient(135deg, #74ebd5, #0077ff);
    color: white;
    font-size: 28px;
    
    display: flex;
    align-items: center;
    justify-content: center;
    
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0,119,255,0.6);
    transition: 0.3s;
}

.music-btn:hover {
    transform: translate(-50%, -50%) scale(1.1);
    box-shadow: 0 0 30px rgba(0,119,255,0.9);
}

.music-btn.playing {
    animation: pulse 1.5s infinite;
}

@keyframes pulse {
    0% { box-shadow: 0 0 10px rgba(0,119,255,0.6); }
    50% { box-shadow: 0 0 30px rgba(0,119,255,1); }
    100% { box-shadow: 0 0 10px rgba(0,119,255,0.6); }
}

/* QR */
.qr img {
    width: 120px;
    margin-top: 10px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="container">
    <img src="foto.jpg" class="profile">

    <h1>DILSA IHSAN PADLILLAH</h1>
    <p>Kelas: XII TKJ 4</p>
    <p>Sekolah: SMK KOMPUTAMA MAJENANG</p>

    <h3>Hobi</h3>
    <p>Bermain game, olahraga</p>

    <h3>Cita-cita</h3>
    <p>Pengusaha sukses</p>

    <h3>Media Sosial</h3>
    <div class="social">
        <a href="https://instagram.com/dlsaiksnfdilh" target="_blank">Instagram</a>
        <a href="https://tiktok.com/@asadie.ll_" target="_blank">TikTok</a>
    </div>

    <!-- QR -->
    <h3>Scan Website Saya</h3>
    <div class="qr">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://dilsai.github.io/nama-repo/">
    </div>
</div>

<!-- TOMBOL -->
<button class="music-btn" onclick="toggleMusic()" id="btnMusic">
    🎵
</button>

<!-- AUDIO (FIX) -->
<audio id="musik" loop>
    <source src="musik.mp3" type="audio/mpeg">
</audio>

<script>
var musik = document.getElementById("musik");
var btn = document.getElementById("btnMusic");

function toggleMusic() {
    if (musik.paused) {
        musik.play();
        btn.innerHTML = "⏸️";
        btn.classList.add("playing");
    } else {
        musik.pause();
        btn.innerHTML = "🎵";
        btn.classList.remove("playing");
    }
}
</script>

</body>
</html>
